name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install google-genai==0.3.0 azure-cognitiveservices-speech==1.42.0 pydub==0.25.1 requests==2.32.3 pillow==10.4.0 numpy==1.26.4 moviepy==1.0.3

    - name: Verify FFmpeg
      uses: FedericoCarboni/setup-ffmpeg@v2
      id: setup-ffmpeg

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --console ^
          --name "Moohyup_Generator" ^
          --add-data "core_v2;core_v2" ^
          --add-data "config.json;." ^
          --hidden-import "pydub" ^
          --hidden-import "PIL" ^
          --hidden-import "moviepy" ^
          launcher.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Moohyup_Generator_EXE
        path: dist/Moohyup_Generator.exe
