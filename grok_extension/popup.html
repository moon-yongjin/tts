<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Inter', sans-serif; background: #000; color: #0f0; margin: 0; padding: 15px; width: 250px; }
    h2 { font-size: 1.1rem; border-left: 4px solid #0f0; padding-left: 10px; margin-top: 0; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-primary { background: #0f0; color: #000; }
    .btn-secondary { background: #222; color: #fff; border: 1px solid #444; }
    #status { margin-bottom: 10px; font-weight: bold; color: #ff0; text-align: center; }
  </style>
</head>
<body>
  <h2>GrokBulk V6 Stable</h2>
  <div class="card">
    <div id="status">● 오리지널 브릿지 대기 중</div>
    <button id="btnStart" class="btn btn-primary">🎬 그록 가동 시작 (3시 버전)</button>
    <button id="btnStop" class="btn btn-secondary">⏹ 중지</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
